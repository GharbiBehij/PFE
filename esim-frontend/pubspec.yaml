name: esim_frontend
description: "eSIM management app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP client
  dio: ^5.9.2

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^15.1.3

  # Models + serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Secure token storage
  flutter_secure_storage: ^9.2.4

  # Lightweight cache
  shared_preferences: ^2.5.5

  # WebSocket (Socket.IO)
  socket_io_client: ^3.1.4

  # QR code for eSIM activation
  qr_flutter: ^4.1.0

  # Remote images with caching
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true
